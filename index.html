<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Tider Beregner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #D20014;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .input-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .input-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #208684;
            font-size: 16px;
        }
        .input-section p {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 8px;
            color: #e0e0e0;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #208684;
            box-shadow: 0 0 8px rgba(32, 134, 132, 0.3);
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc {
            background: #D20014;
            color: white;
        }
        .btn-calc:hover {
            background: #9F000F;
            transform: translateY(-1px);
        }
        .btn-clear {
            background: #333;
            color: #ccc;
        }
        .btn-clear:hover {
            background: #444;
        }
        .results {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #0f3460;
            display: none;
        }
        .results h2 {
            color: #208684;
            margin-bottom: 16px;
            font-size: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th {
            background: #0f3460;
            color: #208684;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #208684;
        }
        td {
            padding: 10px 16px;
            border-bottom: 1px solid #1a3a5c;
            font-size: 14px;
        }
        tr:hover {
            background: rgba(32, 134, 132, 0.08);
        }
        tr.total-row {
            background: rgba(210, 0, 20, 0.15);
            font-weight: 700;
        }
        tr.total-row td {
            border-top: 2px solid #D20014;
            color: #ff6b6b;
            font-size: 15px;
        }
        .no-data {
            color: #555;
            text-align: center;
            font-style: italic;
        }
        .mek {
            color: #f0a500;
        }
        .el {
            color: #4fc3f7;
        }
        .error-msg {
            background: rgba(210, 0, 20, 0.2);
            border: 1px solid #D20014;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: #ff6b6b;
            display: none;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: #0f3460;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
        }
        .stat-box .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-box .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
        }
        .stat-box .unit {
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱ Stop Tider Beregner</h1>
        <p class="subtitle">Indsæt data fra Excel – beregn Mek og El stoptider pr. maskine</p>

        <div class="input-section">
            <label>📋 Indsæt data fra Excel:</label>
            <p>Kolonner: <strong>min</strong> | <strong>Maskine</strong> | <strong>fejl (ignoreres)</strong> | <strong>Mek/EL</strong></p>
            <textarea id="dataInput" placeholder="Indsæt dine rækker her fra Excel...&#10;&#10;Eksempel:&#10;50&#9;Krymperen&#9;Smed på løftegrej&#9;Mek&#10;10&#9;PSM01&#9;Fejl på motor&#9;El&#10;25&#9;Sav 42&#9;Kniv skift&#9;Mek"></textarea>
            <div class="buttons">
                <button class="btn btn-calc" onclick="beregn()">📊 Beregn</button>
                <button class="btn btn-clear" onclick="ryd()">🗑 Ryd</button>
            </div>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="results" id="results">
            <h2>📊 Resultater</h2>

            <div class="stats">
                <div class="stat-box">
                    <div class="label">Total Mek</div>
                    <div class="value mek" id="totalMek">0</div>
                    <div class="unit">minutter</div>
                </div>
                <div class="stat-box">
                    <div class="label">Total El</div>
                    <div class="value el" id="totalEl">0</div>
                    <div class="unit">minutter</div>
                </div>
                <div class="stat-box">
                    <div class="label">Samlet Stop</div>
                    <div class="value" id="totalAll" style="color: #D20014;">0</div>
                    <div class="unit">minutter</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Maskine</th>
                        <th>Mek (min)</th>
                        <th>El (min)</th>
                        <th>Total (min)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Fast rækkefølge af maskiner
        const maskinRækkefølge = [
            "PSM01",
            "PSM02",
            "Teclict sav01",
            "Lamel",
            "Krymperen",
            "RPI XII",
            "Sav 42",
            "Sav 44",
            "Sav 46",
            "Sav 48",
            "Rundsav (Sav35)",
            "Valse",
            "Båndsav 33",
            "Båndsav 34",
            "Båndsav Linje"
        ];

        // Normalisering: map varianter til det korrekte navn
        function normaliserMaskin(navn) {
            const n = navn.trim().toLowerCase();

            for (let i = 0; i < maskinRækkefølge.length; i++) {
                if (n === maskinRækkefølge[i].toLowerCase()) {
                    return maskinRækkefølge[i];
                }
            }

            // Fuzzy matching for varianter
            if (n.includes("psm01") || n === "psm 01") return "PSM01";
            if (n.includes("psm02") || n === "psm 02") return "PSM02";
            if (n.includes("teclict") || n.includes("telclikt") || n.includes("sav01") || n.includes("sav 01")) return "Teclict sav01";
            if (n.includes("lamel")) return "Lamel";
            if (n.includes("krymp")) return "Krymperen";
            if (n.includes("rpi")) return "RPI XII";
            if (n.includes("sav 42") || n === "sav42") return "Sav 42";
            if (n.includes("sav 44") || n === "sav44") return "Sav 44";
            if (n.includes("sav 46") || n === "sav46") return "Sav 46";
            if (n.includes("sav 48") || n === "sav48") return "Sav 48";
            if (n.includes("rundsav") || n.includes("sav35") || n.includes("sav 35")) return "Rundsav (Sav35)";
            if (n.includes("valse")) return "Valse";
            if (n.includes("båndsav 33") || n.includes("båndsav33")) return "Båndsav 33";
            if (n.includes("båndsav 34") || n.includes("båndsav34")) return "Båndsav 34";
            if (n.includes("båndsav l") || n.includes("båndsav lj") || n.includes("båndsav linje")) return "Båndsav Linje";

            // Ukendt maskine – returner originalt navn trimmet
            return navn.trim();
        }

        function normaliserType(type) {
            const t = type.trim().toLowerCase();
            if (t === "mek") return "Mek";
            if (t === "el") return "El";
            return null;
        }

        function beregn() {
            const input = document.getElementById('dataInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const results = document.getElementById('results');

            errorMsg.style.display = 'none';
            results.style.display = 'none';

            if (!input) {
                errorMsg.textContent = '⚠ Indsæt venligst data i feltet ovenfor.';
                errorMsg.style.display = 'block';
                return;
            }

            const linjer = input.split('\n');
            const data = {}; // { maskinNavn: { Mek: 0, El: 0 } }
            let fejlLinjer = 0;

            for (let linje of linjer) {
                linje = linje.trim();
                if (!linje) continue;

                // Split på tab
                const dele = linje.split('\t');

                // Skal have mindst 4 kolonner: min, maskine, fejl, mek/el
                if (dele.length < 4) {
                    // Kan være en subtotal-linje (kun et tal) – ignorer
                    fejlLinjer++;
                    continue;
                }

                const minStr = dele[0].trim();
                const maskinRå = dele[1].trim();
                // dele[2] = fejlbeskrivelse – ignoreres
                const typeRå = dele[3].trim();

                // Parse minutter
                const minutter = parseInt(minStr, 10);
                if (isNaN(minutter)) {
                    fejlLinjer++;
                    continue;
                }

                // Normaliser type
                const type = normaliserType(typeRå);
                if (!type) {
                    fejlLinjer++;
                    continue;
                }

                // Normaliser maskinnavn
                const maskine = normaliserMaskin(maskinRå);

                if (!data[maskine]) {
                    data[maskine] = { Mek: 0, El: 0 };
                }
                data[maskine][type] += minutter;
            }

            // Check om vi har data
            const alleMaskiner = Object.keys(data);
            if (alleMaskiner.length === 0) {
                errorMsg.textContent = '⚠ Kunne ikke finde gyldige datarækker. Tjek at formatet er: min [TAB] Maskine [TAB] fejl [TAB] Mek/El';
                errorMsg.style.display = 'block';
                return;
            }

            // Byg sorteret liste: først kendte maskiner i fast rækkefølge, derefter ukendte
            const sorteredeMaskiner = [];
            for (let m of maskinRækkefølge) {
                if (data[m]) {
                    sorteredeMaskiner.push(m);
                }
            }
            // Tilføj eventuelle ukendte maskiner til sidst
            for (let m of alleMaskiner) {
                if (!sorteredeMaskiner.includes(m)) {
                    sorteredeMaskiner.push(m);
                }
            }

            // Beregn totaler
            let totalMek = 0;
            let totalEl = 0;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            for (let maskine of sorteredeMaskiner) {
                const mek = data[maskine].Mek;
                const el = data[maskine].El;
                const total = mek + el;

                totalMek += mek;
                totalEl += el;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${maskine}</td>
                    <td class="mek">${mek > 0 ? mek : '-'}</td>
                    <td class="el">${el > 0 ? el : '-'}</td>
                    <td>${total}</td>
