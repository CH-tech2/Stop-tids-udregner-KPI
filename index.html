<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Tider Beregner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #D20014;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .input-section {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }

        .input-section label {
            display: block;
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #208684;
            font-weight: bold;
        }

        .input-section p {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #208684;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: #D20014;
            box-shadow: 0 0 8px rgba(210, 0, 20, 0.3);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-calc {
            background: #D20014;
            color: white;
        }

        .btn-calc:hover {
            background: #9F000F;
        }

        .btn-clear {
            background: #333;
            color: #ccc;
        }

        .btn-clear:hover {
            background: #555;
        }

        .result-section {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
            display: none;
        }

        .result-section h2 {
            color: #208684;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th {
            background: #0f3460;
            color: #208684;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.95em;
            border-bottom: 2px solid #208684;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid #1a1a3e;
            font-size: 0.9em;
        }

        tr:hover {
            background: rgba(32, 134, 132, 0.1);
        }

        tr.total-row {
            background: rgba(210, 0, 20, 0.15);
            font-weight: bold;
        }

        tr.total-row td {
            border-top: 2px solid #D20014;
            color: #D20014;
            font-size: 1em;
        }

        .summary-cards {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 150px;
            background: #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .card .label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 5px;
        }

        .card .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .card.mek .value {
            color: #208684;
        }

        .card.el .value {
            color: #D20014;
        }

        .card.total .value {
            color: #e0e0e0;
        }

        .error-msg {
            background: rgba(210, 0, 20, 0.2);
            border: 1px solid #D20014;
            border-radius: 8px;
            padding: 12px;
            color: #ff6b6b;
            margin-top: 10px;
            display: none;
        }

        .ignored-info {
            color: #666;
            font-size: 0.8em;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Stop Tider Beregner</h1>
        <p class="subtitle">Indsæt data fra Excel → Beregn Mek/El tid pr. maskine</p>

        <div class="input-section">
            <label>📋 Indsæt data fra Excel:</label>
            <p>Kopier kolonnerne <strong>min | Maskine | fejl | Mek/EL</strong> fra Excel og indsæt herunder.</p>
            <textarea id="dataInput" placeholder="Indsæt data her fra Excel...

Eksempel:
50	Krymperen	Smed på løftegrej	Mek
10	PSM01	Fejl på motor	El
30	Sav 42	Kniv skift	Mek"></textarea>
            <div class="buttons">
                <button class="btn btn-calc" onclick="beregn()">🔢 Beregn</button>
                <button class="btn btn-clear" onclick="ryd()">🗑️ Ryd</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <h2>📊 Resultat</h2>

            <div class="summary-cards">
                <div class="card mek">
                    <div class="label">Total Mek</div>
                    <div class="value" id="totalMek">0 min</div>
                </div>
                <div class="card el">
                    <div class="label">Total El</div>
                    <div class="value" id="totalEl">0 min</div>
                </div>
                <div class="card total">
                    <div class="label">Total Stop</div>
                    <div class="value" id="totalStop">0 min</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Maskine</th>
                        <th>Mek (min)</th>
                        <th>El (min)</th>
                        <th>Total (min)</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                </tbody>
            </table>

            <div class="ignored-info" id="ignoredInfo"></div>
        </div>
    </div>

    <script>
        // Fast rækkefølge af maskiner
        const MASKINE_ORDER = [
            "PSM01",
            "PSM02",
            "Teclict sav01",
            "Lamel",
            "Krymperen",
            "RPI XII",
            "Sav 42",
            "Sav 44",
            "Sav 46",
            "Sav 48",
            "Rundsav (Sav35)",
            "Valse",
            "Båndsav 33",
            "Båndsav 34",
            "Båndsav Linje"
        ];

        // Normalisering: mappe variationer til det korrekte navn
        function normalizeMaskine(name) {
            const lower = name.trim().toLowerCase();

            for (let i = 0; i < MASKINE_ORDER.length; i++) {
                if (lower === MASKINE_ORDER[i].toLowerCase()) {
                    return MASKINE_ORDER[i];
                }
            }

            // Fuzzy matches for almindelige variationer
            if (lower.includes("psm01") || lower === "psm 01") return "PSM01";
            if (lower.includes("psm02") || lower === "psm 02") return "PSM02";
            if (lower.includes("teclict") || lower.includes("telclikt") || lower.includes("sav01") || lower.includes("sav 01")) return "Teclict sav01";
            if (lower.includes("lamel")) return "Lamel";
            if (lower.includes("krymp")) return "Krymperen";
            if (lower.includes("rpi")) return "RPI XII";
            if (lower.includes("sav 42") || lower === "sav42") return "Sav 42";
            if (lower.includes("sav 44") || lower === "sav44") return "Sav 44";
            if (lower.includes("sav 46") || lower === "sav46") return "Sav 46";
            if (lower.includes("sav 48") || lower === "sav48") return "Sav 48";
            if (lower.includes("rundsav") || lower.includes("sav35") || lower.includes("sav 35")) return "Rundsav (Sav35)";
            if (lower.includes("valse")) return "Valse";
            if (lower.includes("båndsav 33") || lower.includes("baandsav 33")) return "Båndsav 33";
            if (lower.includes("båndsav 34") || lower.includes("baandsav 34")) return "Båndsav 34";
            if (lower.includes("båndsav l") || lower.includes("baandsav l") || lower.includes("båndsav lj") || lower.includes("båndsav linje")) return "Båndsav Linje";

            // Returner originalt navn hvis ingen match
            return name.trim();
        }

        function beregn() {
            const raw = document.getElementById('dataInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const resultSection = document.getElementById('resultSection');

            errorMsg.style.display = 'none';
            resultSection.style.display = 'none';

            if (!raw) {
                errorMsg.textContent = '⚠️ Indsæt data først!';
                errorMsg.style.display = 'block';
                return;
            }

            const lines = raw.split('\n');
            const data = {}; // maskine -> {mek: 0, el: 0}
            let ignoredCount = 0;
            let parsedCount = 0;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                // Split på tab (fra Excel)
                const parts = line.split('\t');

                // Ignorer linjer der kun har ét tal (subtotaler)
                if (parts.length === 1) {
                    const val = parts[0].replace(/\s/g, '');
                    if (!isNaN(val) && val !== '') {
                        ignoredCount++;
                        continue;
                    }
                }

                // Vi forventer mindst 4 kolonner: min, Maskine, fejl, Mek/EL
                if (parts.length < 4) {
                    ignoredCount++;
                    continue;
                }

                const minVal = parseFloat(parts[0].replace(',', '.').trim());
                const maskineRaw = parts[1].trim();
                // parts[2] er fejl - ignoreres
                const mekEl = parts[3].trim().toLowerCase();

                // Valider
                if (isNaN(minVal)) {
                    ignoredCount++;
                    continue;
                }

                if (mekEl !== 'mek' && mekEl !== 'el') {
                    ignoredCount++;
                    continue;
                }

                const maskine = normalizeMaskine(maskineRaw);

                if (!data[maskine]) {
                    data[maskine] = { mek: 0, el: 0 };
                }

                if (mekEl === 'mek') {
                    data[maskine].mek += minVal;
                } else {
                    data[maskine].el += minVal;
                }

                parsedCount++;
            }

            if (parsedCount === 0) {
                errorMsg.textContent = '⚠️ Ingen gyldige data fundet. Sørg for at data er kopieret fra Excel med tab-separering (min | Maskine | fejl | Mek/EL).';
                errorMsg.style.display = 'block';
                return;
            }

            // Byg resultat-tabel i fast rækkefølge
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';

            let totalMek = 0;
            let totalEl = 0;

            // Først vis maskiner i den faste rækkefølge
            const shownMachines = new Set();

            for (const maskine of MASKINE_ORDER) {
                if (data[maskine]) {
                    const mek = data[maskine].mek;
                    const el = data[maskine].el;
                    const total = mek + el;
                    totalMek += mek;
                    totalEl += el;
                    shownMachines.add(maskine);

                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${maskine}</td><td>${mek}</td><td>${el}</td><td>${total}</td>`;
                    tbody.appendChild(tr);
                }
            }

            // Vis maskiner der IKKE er i den faste liste (ukendte)
            for (const maskine of Object.keys(data)) {
                if (!shownMachines.has(maskine)) {
                    const mek = data[maskine].mek;
                    const el = data[maskine].el;
                    const total = mek + el;
                    totalMek += mek;
                    totalEl += el;

                    const tr = document.
